server:
    forward-headers-strategy: native
    port: 8081
    tomcat:
        max-swallow-size: -1  # -1 means unlimited
        max-http-form-post-size: 20MB
app:
    security:
        aes-seed: ${secret}
spring:
    jpa:
        hibernate:
            temp:
                use_jdbc_metadata_defaults: false
        database-platform: org.hibernate.dialect.PostgreSQLDialect
    autoconfigure:
        exclude: org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
    data:
        mongodb:
            uri: ${MONGO_URL}
            auto-index-creation: true
    datasource:
        hikari:
            maximum-pool-size: 3 # Reduce further if only doing light metadata work
            minimum-idle: 1
            idle-timeout: 30000
            max-lifetime: 1800000
            connection-timeout: 60000 # Give it 60s to find a spot in the pool
        url: jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
        username: postgres.axxwxwxnqteramwkrwrn
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    application:
        name: AiServicesmartSeat

    ai:
        ollama:
            base-url: https://unshowering-uneliminated-aurelia.ngrok-free.dev
            chat:
                options:
                    # llama3.2 is excellent for MCQs, but you can also use mistral or gemma2
                    model: ${MODEL}
                    temperature: 0.7
                    # This helps local models stick to the JSON format you need
                    format: json
            init:
                timeout: 600s
    servlet:
        multipart:
            enabled: true
            max-file-size: 20MB
            max-request-size: 20MB

# Optional: Enable better logging to see the prompt exchange in your console
logging:
    level:
        org:
            springframework:
                ai: DEBUG
            apache:
                tika: ERROR
